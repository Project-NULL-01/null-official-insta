  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00F0FF;
      --dark-bg: #000000;
      --dark-card: #0a0a0a;
      --dark-border: #1a1a1a;
      --text-primary: #FFFFFF;
      --text-secondary: #999999;
      --text-muted: #555555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--dark-bg);
      color: var(--text-primary);
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      line-height: 1.8;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(0, 240, 255, 0.08);
    }

    .nav-logo {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--neon-blue);
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
    }

    .nav-back {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 2px;
      transition: color 0.3s;
      font-family: 'Orbitron', monospace;
    }
    .nav-back:hover { color: var(--neon-blue); }

    /* MAIN */
    .legal-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 140px 48px 80px;
    }

    .legal-label {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--neon-blue);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.6;
    }

    .legal-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 48px;
      letter-spacing: 2px;
      line-height: 1.4;
    }

    .legal-table {
      width: 100%;
      border-collapse: collapse;
    }

    .legal-table tr {
      border-bottom: 1px solid var(--dark-border);
    }

    .legal-table th {
      text-align: left;
      vertical-align: top;
      padding: 20px 24px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      width: 200px;
      letter-spacing: 1px;
      background: rgba(0, 240, 255, 0.02);
      border-right: 1px solid var(--dark-border);
    }

    .legal-table td {
      padding: 20px 24px;
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.8;
    }

    .legal-footer {
      margin-top: 80px;
      text-align: center;
      font-size: 10px;
      color: #333333;
      letter-spacing: 2px;
      font-family: 'Orbitron', monospace;
    }

    @media (max-width: 640px) {
      .legal-container { padding: 120px 20px 60px; }
      nav { padding: 16px 24px; }
      .legal-table th {
        display: block;
        width: 100%;
        padding: 16px 16px 8px;
        border-right: none;
      }
      .legal-table td {
        display: block;
        padding: 8px 16px 16px;
      }
    }
  </style>
</head>
<body>
